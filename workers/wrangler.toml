name = "eddydate-session-timeout"
main = "session-timeout.js"
compatibility_date = "2024-01-01"

# 1. npx wrangler kv namespace create SESSIONS
# 2. id unten eintragen (gleiche ID wie in Root-wrangler.toml / Pages Dashboard)
# 3. Secrets setzen: npx wrangler secret put TELEGRAM_BOT_TOKEN -c workers/wrangler.toml
#                    npx wrangler secret put TELEGRAM_CHAT_ID -c workers/wrangler.toml
#
# [[kv_namespaces]]
# binding = "SESSIONS"
# id = "DEINE_KV_NAMESPACE_ID"

[[kv_namespaces]]
binding = "SESSIONS"
id = "b8f3dc670d304386b01762efcd41c4e4"

[triggers]
crons = ["*/2 * * * *"]
