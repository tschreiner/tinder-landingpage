name = "eddydate-com"
compatibility_date = "2024-01-01"
pages_build_output_dir = "."

# Secrets werden NICHT hier gespeichert, nur deklariert (Werte via Dashboard oder wrangler pages secret put):
[secrets]
required = ["TELEGRAM_BOT_TOKEN", "TELEGRAM_CHAT_ID"]

# KV fuer Live-Session-Timeout (erforderlich fuer automatisches Abschliessen):
# 1. npx wrangler kv namespace create SESSIONS
# 2. id unten eintragen
# 3. In Cloudflare Pages: Settings -> Functions -> KV namespace bindings
#    Variable name: SESSIONS
# 4. Gleiche Namespace-ID in workers/wrangler.toml eintragen
#
[[kv_namespaces]]
binding = "SESSIONS"
id = "b8f3dc670d304386b01762efcd41c4e4"

# KV fuer Besuchszaehler (optional):
# 1. npx wrangler kv namespace create VISIT_COUNTER
# 2. id unten eintragen
# 3. In Cloudflare Pages: Settings -> Functions -> KV namespace bindings
#    Variable name: VISIT_COUNTER
#
[[kv_namespaces]]
binding = "VISIT_COUNTER"
id = "57e09977d04b46469b9770267a833402"
